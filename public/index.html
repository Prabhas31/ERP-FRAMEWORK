<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Live Phone Location</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            width: 100%;
            height: 100%;
            display: none;
        }

        #expired {
            display: none;
            height: 100%;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 25%;
            font-size: 20px;
        }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <!-- Google Maps -->
    <script async defer
            src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD3IkKqLEOXmZRfz7O1zjs_iv9GNt5PFN0&callback=initMap">
    </script>
</head>

<body>

<div id="map"></div>
<div id="expired">🔒 This live location link has expired.</div>

<script>

    const firebaseConfig = {
        apiKey: "AIzaSyAA3b43ZFpFHx2Pcv7HhD08O7hsn3TyA-0",
        databaseURL: "https://emergencyphonerecovery-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "emergencyphonerecovery"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map;
    let marker;
    let displayName = "Stolen Device";

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("sid");

    function showExpired() {

        document.getElementById("map").style.display = "none";
        document.getElementById("expired").style.display = "block";

    }

    function initMap() {

        // OWNER MODE (no session required)
        if (!sessionId) {

            console.log("Owner mode — bypass session");
            startLiveTracking();
            return;

        }

        // SHARE MODE
        const sessionRef =
            db.ref("users/owner_001/share_sessions/" + sessionId);

        sessionRef.once("value", snap => {

            if (!snap.exists()) {

                showExpired();
                return;

            }

            startLiveTracking();

        });

    }

    function startLiveTracking() {

        document.getElementById("expired").style.display = "none";
        document.getElementById("map").style.display = "block";

        // Load device display name safely
        db.ref("users/owner_001/device_info/display_name")
          .once("value", nameSnap => {

              if (nameSnap.exists()) {

                  displayName = nameSnap.val();

                  if (marker) {

                      marker.setTitle(displayName);
                      marker.setLabel(displayName.split(" ")[0]);

                  }

              }

          });

        map = new google.maps.Map(
            document.getElementById("map"),
            {
                zoom: 16,
                center: { lat: 17.385044, lng: 78.486671 }
            }
        );

        marker = new google.maps.Marker({
            map: map,
            title: displayName,
            label: displayName.split(" ")[0]
        });

        const liveRef =
            db.ref("users/owner_001/live_location");

        liveRef.on("value", snap => {

            const d = snap.val();

            if (!d) {

                showExpired();
                liveRef.off();
                return;

            }

            const lat = d.latitude ?? d.lat;
            const lng = d.longitude ?? d.lng;

            if (typeof lat !== "number" ||
                typeof lng !== "number") return;

            const pos = { lat, lng };

            marker.setPosition(pos);
            marker.setTitle(displayName);

            map.panTo(pos);

        });

    }

</script>

</body>
</html>
