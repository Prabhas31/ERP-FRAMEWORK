<!DOCTYPE html>
<html>
<head>
    <title>Live Location Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html, body {
          margin: 0;
          padding: 0;
          height: 100%;
        }
        #map {
          height: 100%;
          width: 100%;
        }
        #status {
          position: absolute;
          top: 10px;
          left: 10px;
          background: white;
          padding: 8px 12px;
          border-radius: 6px;
          font-size: 14px;
          z-index: 10;
          box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key="AIzaSyDGSq4DTQYCKMVA0EKriOZZPNexR4aoEU4"></script>
</head>

<body>

<div id="status">Connecting…</div>
<div id="map"></div>

<script>
    // 🔥 Firebase config (REPLACE with your real config)
    const firebaseConfig = {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "emergencyphonerecovery.firebaseapp.com",
      databaseURL: "https://emergencyphonerecovery-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "emergencyphonerecovery"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const statusEl = document.getElementById("status");

    // 🔍 Get session id from URL
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("sid");

    if (!sessionId) {
      statusEl.innerText = "Invalid link (no session id)";
      throw new Error("No session id");
    }

    // 🧠 Step 1: Read session
    const sessionRef = db.ref("share_sessions/" + sessionId);

    sessionRef.once("value").then(snapshot => {

      if (!snapshot.exists()) {
        statusEl.innerText = "Session not found";
        return;
      }

      const session = snapshot.val();

      if (!session.active) {
        statusEl.innerText = "Session inactive";
        return;
      }

      if (!session.owner_id) {
        statusEl.innerText = "Owner not found";
        return;
      }

      listenToLiveLocation(session.owner_id);

    }).catch(err => {
      console.error(err);
      statusEl.innerText = "Error loading session";
    });

    let map;
    let marker;

    function listenToLiveLocation(ownerId) {

      const locationRef = db.ref("users/" + ownerId + "/live_location");

      locationRef.on("value", snapshot => {

        if (!snapshot.exists()) {
          statusEl.innerText = "Waiting for location…";
          return;
        }

        const loc = snapshot.val();

        if (!loc.lat || !loc.lng) {
          statusEl.innerText = "Invalid location data";
          return;
        }

        const position = {
          lat: loc.lat,
          lng: loc.lng
        };

        statusEl.innerText =
          "Live • Updated: " + new Date(loc.timestamp).toLocaleTimeString();

        if (!map) {
          map = new google.maps.Map(document.getElementById("map"), {
            center: position,
            zoom: 17
          });

          marker = new google.maps.Marker({
            position: position,
            map: map,
            title: "Live Location"
          });
        } else {
          marker.setPosition(position);
          map.panTo(position);
        }
      });
    }
</script>

</body>
</html>
